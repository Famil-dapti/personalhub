name: Deploy DB (dev branch)

on:
  push:
    branches: [dev]
    paths:
      - 'supabase/migrations/**'

jobs:
  deploy-db:
    name: Push migrations to Supabase
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push database migrations
        run: |
          supabase db push \
            --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} \
            --password ${{ secrets.SUPABASE_DB_PASSWORD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
