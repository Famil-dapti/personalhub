name: Deploy Web to GitHub Pages

# Builds the Flutter web app and publishes it to GitHub Pages on every push to main.
# Supabase backend is untouched — this deploys only the frontend.
# URL: https://famil-dapti.github.io/personalhub/

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for the same ref.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.1
          channel: stable
          cache: true

      - run: flutter pub get

      # base-href must match the Pages sub-path (/personalhub/) so assets resolve.
      - run: flutter build web --release --base-href /personalhub/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
